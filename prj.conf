#SYSTEM
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y
#PERIPHERALS
# CONFIG_ADC=y
# CONFIG_ADC_LOG_LEVEL_DBG=y
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_BME280=y
CONFIG_BME280_STANDBY_500MS=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y

CONFIG_DISPLAY=y
CONFIG_LVGL=y
CONFIG_CHARACTER_FRAMEBUFFER=y
CONFIG_SSD1306=y

# 1-bit Monochrome settings
CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_LV_COLOR_DEPTH_1=y

# For 128x32, we don't need a massive buffer
CONFIG_LV_Z_VDB_SIZE=32
CONFIG_LV_Z_MEM_POOL_SIZE=16384

# Enable a small font that fits well in 32 pixels
CONFIG_LV_FONT_MONTSERRAT_10=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_10=y

#BLUETOOTH
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_DEVICE_NAME="NRF5340Dev"
CONFIG_BT_GATT_CACHING=y
CONFIG_BT_GATT_SERVICE_CHANGED=y

